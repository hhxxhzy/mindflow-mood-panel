name: React Native CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  # 代码检查和测试
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npx tsc --noEmit || echo "TypeScript check skipped"

      - name: Run ESLint
        run: npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=0 || echo "ESLint check skipped"

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: success()
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  # 构建 Android APK
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          # 如果使用 Expo
          if [ -f "app.json" ] || [ -f "app.config.js" ] || [ -f "app.config.ts" ]; then
            npm install -g eas-cli
            if [ -n "$EXPO_TOKEN" ]; then
              eas login --token $EXPO_TOKEN
              eas build --platform android --profile preview --non-interactive
            else
              echo "EXPO_TOKEN not set, skipping EAS build"
              # 预构建然后本地构建
              npx expo prebuild --platform android --clean
              cd android && ./gradlew assembleRelease
            fi
          else
            # React Native CLI 项目
            cd android && ./gradlew assembleRelease
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
            *.apk
            *.aab
          retention-days: 7

  # 构建 iOS (需要 macOS)
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          cd ios && pod install --repo-update

      - name: Build iOS
        run: |
          if [ -f "app.json" ] || [ -f "app.config.js" ] || [ -f "app.config.ts" ]; then
            # Expo 项目
            npm install -g eas-cli
            if [ -n "$EXPO_TOKEN" ]; then
              eas login --token $EXPO_TOKEN
              eas build --platform ios --profile preview --non-interactive
            else
              echo "EXPO_TOKEN not set, skipping iOS build"
            fi
          else
            # React Native CLI 项目
            cd ios
            xcodebuild -workspace MindFlow.xcworkspace \
                      -scheme MindFlow \
                      -configuration Release \
                      -archivePath $PWD/build/MindFlow.xcarchive \
                      archive
          fi

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            ios/build/
            *.ipa
          retention-days: 7

  # 创建 GitHub Release (仅 main 分支)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts/android

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-build
          path: ./artifacts/ios

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: MindFlow v${{ steps.version.outputs.version }}
          body: |
            ## 🎉 MindFlow 心绪面板 v${{ steps.version.outputs.version }}
            
            ### 📱 移动端应用发布
            
            **构建信息**
            - 版本: v${{ steps.version.outputs.version }}
            - 构建编号: ${{ github.run_number }}
            - 提交: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - 时间: ${{ github.event.head_commit.timestamp }}
            
            **下载链接**
            - Android APK: 见下方附件
            - iOS IPA: 见下方附件
            
            **变更日志**
            ```
            ${{ github.event.head_commit.message }}
            ```
            
            **安装说明**
            1. Android: 下载 APK 文件，在设置中允许"未知来源"安装
            2. iOS: 需要企业证书或通过 TestFlight 安装
            
            **测试反馈**
            请通过以下方式反馈问题：
            - GitHub Issues
            - 飞书群组
            - 邮件反馈
          draft: false
          prerelease: false
          files: |
            artifacts/android/*.apk
            artifacts/android/*.aab
            artifacts/ios/*.ipa

  # 部署通知
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [test, build-android, build-ios, release]
    if: always()
    
    steps:
      - name: Generate deployment summary
        run: |
          echo "## 🚀 MindFlow 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 构建状态" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 代码检查: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 Android 构建: ${{ needs.build-android.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🍎 iOS 构建: ${{ needs.build-ios.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🎯 发布: ${{ needs.release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.release.result }}" == "success" ]]; then
            echo "### 📦 发布版本" >> $GITHUB_STEP_SUMMARY
            echo "新版本已发布到 GitHub Releases!" >> $GITHUB_STEP_SUMMARY
            echo "下载链接: https://github.com/${{ github.repository }}/releases/latest" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 相关链接" >> $GITHUB_STEP_SUMMARY
          echo "- [工作流详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [提交记录](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY

      - name: Send success notification
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: deployments
          SLACK_COLOR: good
          SLACK_TITLE: "✅ MindFlow 构建成功"
          SLACK_MESSAGE: "版本 v${{ steps.version.outputs.version }} 已发布"
          SLACK_FOOTER: "GitHub Actions | ${{ github.repository }}"

      - name: Send failure notification
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: deployments
          SLACK_COLOR: danger
          SLACK_TITLE: "❌ MindFlow 构建失败"
          SLACK_MESSAGE: "请检查构建日志"
          SLACK_FOOTER: "GitHub Actions | ${{ github.repository }}"